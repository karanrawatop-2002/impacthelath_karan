<!DOCTYPE html>
<html>
<head>
  <title>Simple Form</title>
</head>
<body>

  <h2>Day Selection Form</h2>

  <label>Name:</label>
  <input type="text" id="name">
  <br><br>

  <label>Address:</label>
  <input type="text" id="address">
  <br><br>

  <label>Gender:</label>
  <input type="radio" name="gender" value="Male" id="male"> Male
  <input type="radio" name="gender" value="Female" id="female"> Female
  <input type="radio" name="gender" value="Other" id="other"> Other
  <br><br>

  <label>Age:</label>
  <input type="number" id="age">
  <br><br>

  <label>Phone No:</label>
  <input type="text" id="phone">
  <br><br>

  <label>Select Day:</label>
  <select id="day">
    <option value="">Select</option>
    <option value="Monday">Monday</option>
    <option value="Tuesday">Tuesday</option>
    <option value="Wednesday">Wednesday</option>
    <option value="Thursday">Thursday</option>
    <option value="Friday">Friday</option>
    <option value="Saturday">Saturday</option>
    <option value="Sunday">Sunday</option>
  </select>

  <br><br>

  <button onclick="saveData()">Save</button>

  <h3>Saved Data:</h3>
  <p id="output"></p>

  <script>
    function saveData() {
      let name = document.getElementById("name").value;
      let address = document.getElementById("address").value;
      let age = document.getElementById("age").value;
      let phone = document.getElementById("phone").value;
      let day = document.getElementById("day").value;

      // Gender radio button value get
      let gender = document.querySelector('input[name="gender"]:checked');

      if (name == "" || address == "" || age == "" || phone == "" || day == "" || gender == null) {
        alert("Please fill all details");
        return;
      }

      gender = gender.value;

      // Save in localStorage
      localStorage.setItem("Name", name);
      localStorage.setItem("Address", address);
      localStorage.setItem("Gender", gender);
      localStorage.setItem("Age", age);
      localStorage.setItem("Phone", phone);
      localStorage.setItem("Day", day);

      // Show output
      document.getElementById("output").innerHTML =
        "Name: " + name + "<br>" +
        "Address: " + address + "<br>" +
        "Gender: " + gender + "<br>" +
        "Age: " + age + "<br>" +
        "Phone: " + phone + "<br>" +
        "Day: " + day;
    }

    // Page load par saved data show karega
    let savedName = localStorage.getItem("Name");
    let savedAddress = localStorage.getItem("Address");
    let savedGender = localStorage.getItem("Gender");
    let savedAge = localStorage.getItem("Age");
    let savedPhone = localStorage.getItem("Phone");
    let savedDay = localStorage.getItem("Day");

    if (savedName && savedAddress && savedGender && savedAge && savedPhone && savedDay) {
      document.getElementById("output").innerHTML =
        "Name: " + savedName + "<br>" +
        "Address: " + savedAddress + "<br>" +
        "Gender: " + savedGender + "<br>" +
        "Age: " + savedAge + "<br>" +
        "Phone: " + savedPhone + "<br>" +
        "Day: " + savedDay;

      // Fill input fields with saved values
      document.getElementById("name").value = savedName;
      document.getElementById("address").value = savedAddress;
      document.getElementById("age").value = savedAge;
      document.getElementById("phone").value = savedPhone;
      document.getElementById("day").value = savedDay;

      // Gender auto select
      if (savedGender == "Male") document.getElementById("male").checked = true;
      if (savedGender == "Female") document.getElementById("female").checked = true;
      if (savedGender == "Other") document.getElementById("other").checked = true;
    }
  </script>

</body>
</html>
